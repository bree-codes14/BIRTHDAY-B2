<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday B2! 🎉</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to bottom, #ffe6f0, #fff0f5);
      text-align: center;
      overflow-x: hidden;
      overflow-y: hidden;
    }

    h1 {
      font-size: 8vw;
      color: #ff3366;
      margin-top: 5vw;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-20px);}
      60% {transform: translateY(-10px);}
    }

    p {
      font-size: 4vw;
      color: #ff6699;
      margin-bottom: 5vw;
    }

    button {
      font-size: 5vw;
      padding: 3vw 6vw;
      background-color: #ff6699;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      margin: 5vw;
      transition: transform 0.2s, background-color 0.2s;
    }
    button:hover {
      transform: scale(1.1);
      background-color: #ff3366;
    }

    /* Confetti */
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      width: 2vw;
      height: 2vw;
      opacity: 0.7;
      animation: fall 5s linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); }
      100% { transform: translateY(110vh) rotate(360deg); }
    }

    /* Balloons */
    .balloon {
      position: fixed;
      bottom: -15vw;
      border-radius: 50% 50% 50% 50%;
      opacity: 0.9;
      z-index: 10000;
      width: 12vw;
      height: 16vw;
      animation: floatUp linear forwards;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-120vh) scale(1.1); }
    }

    /* Floating Happy Birthday Text */
    .floating-text {
      position: fixed;
      font-size: 6vw;
      font-weight: bold;
      color: hsl(340, 80%, 70%);
      z-index: 10000;
      pointer-events: none;
      animation: floatSide 6s ease-in-out infinite;
    }
    @keyframes floatSide {
      0% {transform: translateX(0) translateY(0);}
      50% {transform: translateX(60vw) translateY(-30vh);}
      100% {transform: translateX(0) translateY(0);}
    }
  </style>
</head>
<body>

<h1>🎉 Happy Birthday, B2! 🎉</h1>
<p>Here’s a little surprise just for you 💖</p>

<button id="surpriseBtn">🎁 Click for a Surprise!</button>

<audio id="birthdayAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<div class="confetti" id="confetti"></div>

<script>
  // Confetti
  const confetti = document.getElementById('confetti');
  for (let i = 0; i < 100; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 70%)`;
    piece.style.animationDuration = 3 + Math.random() * 2 + 's';
    confetti.appendChild(piece);
  }

  // Surprise button
  const btn = document.getElementById('surpriseBtn');
  const audio = document.getElementById('birthdayAudio');
  btn.addEventListener('click', () => {
    audio.play();
    btn.textContent = "🎉 Enjoy the Surprise! 🎉";

    // Balloons
    for (let i = 0; i < 15; i++) {
      const balloon = document.createElement('div');
      balloon.className = 'balloon';
      balloon.style.left = Math.random() * 90 + 'vw';
      balloon.style.backgroundColor = `hsl(${Math.random() * 360}, 80%, 70%)`;
      balloon.style.animationDuration = 5 + Math.random() * 5 + 's';
      document.body.appendChild(balloon);
      setTimeout(() => balloon.remove(), 10000);
    }

    // Floating "Happy Birthday!" text
    for (let i = 0; i < 5; i++) {
      const text = document.createElement('div');
      text.className = 'floating-text';
      text.style.left = Math.random() * 80 + 'vw';
      text.style.top = Math.random() * 80 + 'vh';
      text.textContent = "🎂 Happy Birthday! 🎂";
      document.body.appendChild(text);
      setTimeout(() => text.remove(), 6000);
    }
  });
</script>

</body>
</html>
